[workspace]
channels = ["conda-forge"]
name = "American-Express---Default-Prediction-main"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# ── Interactive notebooks (เปิด UI ใน browser) ────────────────────────────────
nb-overview = "marimo run notebook/data_overview/raw_data_overview.py"
nb-eda      = "marimo run notebook/eda/eda_feature_groups.py"
nb-leakage  = "marimo run notebook/eda/leakage_detection.py"
nb-risk     = "marimo run notebook/eda/risk_feature_analysis.py"
nb-train    = "marimo run notebook/model/baseline.py"
nb-insights = "marimo run notebook/insights/feature_story.py"

# ── Pipeline steps (headless — ไม่มี UI ใช้ใน terminal ได้เลย) ───────────────
leakage  = "python scripts/leakage_detect.py"
train    = "python scripts/train_baseline.py"

# ── Full pipeline (leakage ก่อน → train ต่อ) ──────────────────────────────────
pipeline = { cmd = "python scripts/leakage_detect.py && python scripts/train_baseline.py" }

[dependencies]
python = ">=3.14.4,<3.15"
polars = ">=1.40.0,<2"
marimo = ">=0.23.3,<0.24"
numpy = ">=2.4.3,<3"
pandas = ">=3.0.2,<4"
matplotlib = ">=3.10.9,<4"
seaborn = ">=0.13.2,<0.14"
pyarrow = ">=24.0.0,<25"
lightgbm = ">=4.6.0,<5"
xgboost = ">=3.0.0,<4"
scikit-learn = ">=1.6.0,<2"
